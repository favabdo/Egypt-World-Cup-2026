services:
  - type: web
    name: toonhub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      # Required for the live-match card (football-data.org). Get a free key
      # at https://www.football-data.org/client/register, then set the
      # actual value in the Render Dashboard -> Environment (do not commit
      # real keys to this file).
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      # Powers per-player tournament stats, coach stats, and match lineups
      # (via xAI's Grok, which searches the web for real data). Get a key at
      # https://console.x.ai, then set the actual value in the Render
      # Dashboard -> Environment (do not commit real keys to this file).
      - key: XAI_API_KEY
        sync: false
      # Optional: overrides the default Grok model ("grok-4.3").
      - key: XAI_MODEL
        sync: false
    autoDeploy: true
